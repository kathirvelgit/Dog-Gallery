<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Gallery</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="top">
        <div class="heading">
          <h1>
            🐶 Dog Gallery
            <span class="small-header d-block fs-6">
              Click to generate then you will find more cuteness!!
            </span>
          </h1>
        </div>

        <div class="content">
          <div class="btn">
            <button class="button" id="generateBtn">Generate</button>
          </div>

          <div class="image">
            <img
              id="dogImage"
              src="https://place.dog/300/200"
              alt="Dog Image"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
